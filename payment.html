<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Internship Portal</title>

<link rel="stylesheet" href="css/all.min.css">
<link rel="stylesheet" href="auth-styles.css">

<style>

/* ===== PAYMENT PAGE ONLY STYLES ===== */

/* center override */


/* card */
.payment-card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
}

/* summary */
.internship-summary {
    background: var(--light-blue);
    border-left: 4px solid var(--primary-blue);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.summary-row:last-child {
    border-top: 1px dashed var(--primary-blue);
    padding-top: 10px;
    font-weight: bold;
    
}

/* payment options */
.payment-methods {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
.payment-method:hover img {
    transform: scale(1.1);
    transition: 0.3s;
}
.payment-method {
    padding: 15px;
    border: 2px solid var(--border-color);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    height: 100px;   /* control card size properly */
}
.payment-method img {
    width:100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 5px;
}
.payment-method.selected {
    border-color: var(--primary-blue);
    background: var(--light-blue);
}

/* amount */
.amount-display {
    background: #f5f5f5;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 15px;
}

.amount-value {
    font-size: 26px;
    font-weight: bold;
}

/* icon input */
.input-wrapper {
    position: relative;
}

.input-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
}

.form-control {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border: 2px solid var(--border-color);
    border-radius: 8px;
}

/* button */
.pay-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.pay-btn:disabled {
    opacity: 0.6;
}

/* modal */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    max-width: 350px;
    width: 90%;
}

</style>
</head>

<body>

<div class="container">

<div class="payment-card">

    <div class="header">
        <h1>Complete Payment</h1>
        <p>Select Payment Method</p>
    </div>

    <div class="form-section">

        <!-- SUMMARY -->
        <div class="internship-summary">
            <div class="summary-row">
                <span id="internship">Internship</span>
                <span id="company">Company</span>
            </div>
            <div class="summary-row">
                <span id="duration"></span>
                <span id="startdate"></span>
            </div>
            <div class="summary-row">
                <span>Total</span>
                <span id="amount">₹0</span>
            </div>
        </div>

        <!-- METHODS -->
        <div class="payment-methods">

        <!-- GPay -->
        <div class="payment-method" onclick="selectPaymentMethod('gpay')" id="method-gpay">
            <img src="images/gpay.png" alt="GPay">
            
        </div>

        <!-- PhonePe -->
        <div class="payment-method" onclick="selectPaymentMethod('phonepay')" id="method-phonepay">
            <img src="images/phonepe.png" alt="PhonePe">
        </div>

        <!-- Card -->
        <div class="payment-method" onclick="selectPaymentMethod('card')" id="method-card">
            <img src="images/creditcard.png" alt="Card">
        </div>
        <!-- NETBANKING -->
        <div class="payment-method" onclick="selectPaymentMethod('netbanking')" id="method-netbanking">
            <img src="images/bank.png" alt="Netbanking">
            <span>Netbanking</span>
        </div>
        </div>  

        <!-- FORM -->
        <div id="paymentForm" style="display:none; margin-top:20px;">

            <div class="amount-display">
                <div class="amount-value" id="amountDisplay">₹0</div>
            </div>

            <!-- PHONE -->
        <!-- PHONE -->
        <div id="mobileForm" style="display:none;">
            <div class="form-group">
                <label>
                    <i class="fas fa-phone"></i> Mobile Number
                </label>
                <input type="text" id="mobileNumber" class="form-control">
            </div>
        </div>

        <!-- UPI -->
        <!-- UPI + QR OPTION -->
        <div id="gpayUpiField" style="display:none;">

            <div class="form-group">
                <label>
                    <i class="fas fa-at"></i> UPI ID (or)
                </label>
                <input type="text" id="upiId" class="form-control">
            </div>

            <div style="text-align:center; margin:15px 0;">
                <b>OR</b>
            </div>

            <!-- QR CODE -->
            <div class="form-group" style="text-align:center;">
                <label>
                    <i class="fas fa-qrcode"></i> Scan QR & Pay
                </label><br>

                <img src="images/qrcode.jpg" alt="QR Code" class="qr-image">
            </div>

            <!-- SCREENSHOT UPLOAD -->
            <div class="form-group">
                <label>
                    <i class="fas fa-image"></i> Upload Payment Screenshot
                </label>
                <input type="file" id="paymentProof" class="form-control" accept="image/*">
            </div>

        </div>

        <!-- CARD -->
        <div id="cardForm" style="display:none;">

            <div class="form-group">
                <label>
                    <i class="fas fa-credit-card"></i> Card Number
                </label>
                <input type="text" id="cardNumber" class="form-control">
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>
                        <i class="fas fa-calendar"></i> Expiry
                    </label>
                    <input type="text" id="expiryDate" class="form-control">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> CVV
                    </label>
                    <input type="password" id="cvv" class="form-control">
                </div>

            </div>

        </div>
        <!-- NETBANKING FORM -->
        <div id="netbankingForm" style="display:none;">
            <div class="form-group">
                <label><i class="fas fa-university"></i> Select Bank</label>
                <select id="bankSelect" class="form-control">
                    <option value="">--Choose Bank--</option>
                    <option value="HDFC">HDFC Bank</option>
                    <option value="SBI">State Bank of India</option>
                    <option value="ICICI">ICICI Bank</option>
                    <option value="Axis">Axis Bank</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Account Number</label>
                <input type="text" id="accountNumber" class="form-control" placeholder="Enter Account Number">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Netbanking Password</label>
                <input type="password" id="netbankingPassword" class="form-control" placeholder="Enter Password">
            </div>
        </div>
            <button class="pay-btn" id="payButton" onclick="processPayment()" disabled>
                Pay <span id="payButtonAmount">₹0</span>
            </button>

        </div>

    </div>
</div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal" id="successModal">
    <div class="modal-content">
        <h3>Payment Successful</h3>
        <p id="transactionId"></p>
        <br/>
        <button onclick="applyAfterPayment()">Confirm Now</button>
    </div>
</div>

<!-- KEEP YOUR ORIGINAL JS (NO CHANGE) -->
<script>
let finalTransactionId = "";
let finalAmount = "";
document.addEventListener("DOMContentLoaded", function () {

const params = new URLSearchParams(window.location.search);

const internshipName = params.get("internship_name") || "";
const companyName = params.get("company_name") || "";
const duration = params.get("duration") || "";
const startDate = params.get("start_date") || "";
const amount = params.get("amount") || "0";
const internshipId = params.get("internship_id") || "";
const sessionId = params.get("session_id") || "";

// Insert values safely
if(document.getElementById("internship"))
document.getElementById("internship").innerText = internshipName;

if(document.getElementById("company"))
document.getElementById("company").innerText = companyName;

if(document.getElementById("duration"))
document.getElementById("duration").innerText = duration;

if(document.getElementById("startdate"))
document.getElementById("startdate").innerText = startDate;

if(document.getElementById("amount"))
document.getElementById("amount").innerText = "₹" + amount;

if(document.getElementById("amountDisplay"))
document.getElementById("amountDisplay").innerHTML = "₹" + amount + " <small>INR</small>";

if(document.getElementById("payButtonAmount"))
document.getElementById("payButtonAmount").innerText = "₹" + amount;

});

let selectedMethod = null;


// SELECT PAYMENT METHOD
function selectPaymentMethod(method) {

selectedMethod = method;

// remove selected
document.querySelectorAll('.payment-method').forEach(el=>{
el.classList.remove('selected');
});

document.getElementById(`method-${method}`).classList.add('selected');

// show main form
document.getElementById('paymentForm').style.display='block';

// hide all forms
document.getElementById('mobileForm').style.display='none';
document.getElementById('cardForm').style.display='none';
document.getElementById('gpayUpiField').style.display='none';

// reset inputs
if(document.getElementById('mobileNumber'))
document.getElementById('mobileNumber').value='';

if(document.getElementById('upiId'))
document.getElementById('upiId').value='';

if(document.getElementById('cardNumber'))
document.getElementById('cardNumber').value='';


// show correct form
if(method==="gpay"){
document.getElementById('gpayUpiField').style.display='block';
setupGpayValidation();
}

else if(method==="phonepay"){
document.getElementById('mobileForm').style.display='block';
setupPhonePeValidation();
}

else if(method==="card"){
document.getElementById('cardForm').style.display='block';
setupCardValidation();
}
else if(method==="netbanking"){
    document.getElementById('netbankingForm').style.display='block';
    setupNetbankingValidation();
}
document.getElementById('payButton').disabled=true;
}



// GOOGLE PAY VALIDATION
function setupGpayValidation(){

const upiInput = document.getElementById('upiId');
const fileInput = document.getElementById('paymentProof');
const payButton = document.getElementById('payButton');

function validate(){

    const upi = upiInput.value;
    const file = fileInput.files.length;

    const upiPattern = /^[a-zA-Z0-9._-]+@[a-zA-Z0-9]+$/;

    // ✅ Allow: UPI OR Screenshot
    if(upiPattern.test(upi) || file > 0){
        payButton.disabled = false;
    } else {
        payButton.disabled = true;
    }
}

upiInput.addEventListener('input', validate);
fileInput.addEventListener('change', validate);

}



// PHONEPE VALIDATION
function setupPhonePeValidation(){

const mobileInput=document.getElementById('mobileNumber');
const payButton=document.getElementById('payButton');

mobileInput.addEventListener('input',function(){

this.value=this.value.replace(/\D/g,'');

if(this.value.length>10){
this.value=this.value.slice(0,10);
}

if(this.value.length===10){
payButton.disabled=false;
}else{
payButton.disabled=true;
}

});

}
function setupNetbankingValidation() {
    const bankSelect = document.getElementById('bankSelect');
    const accountInput = document.getElementById('accountNumber');
    const passwordInput = document.getElementById('netbankingPassword');
    const payButton = document.getElementById('payButton');

    function validate() {
        const bank = bankSelect.value;
        const account = accountInput.value.trim();
        const password = passwordInput.value.trim();

        // enable button only if all fields are filled
        if(bank && account.length >= 9 && password.length >= 4){
            payButton.disabled = false;
        } else {
            payButton.disabled = true;
        }
    }

    bankSelect.addEventListener('change', validate);
    accountInput.addEventListener('input', validate);
    passwordInput.addEventListener('input', validate);
}


// CARD VALIDATION
function setupCardValidation(){

const cardInput=document.getElementById('cardNumber');
const expiryInput=document.getElementById('expiryDate');
const cvvInput=document.getElementById('cvv');
const payButton=document.getElementById('payButton');

function checkValid(){

let card=cardInput.value.replace(/\D/g,'');
let expiry=expiryInput.value;
let cvv=cvvInput.value;

if(card.length===16 && expiry.length===5 && cvv.length===3){
payButton.disabled=false;
}else{
payButton.disabled=true;
}

}

// card number formatting
cardInput.addEventListener('input',function(){

let value=this.value.replace(/\D/g,'');
if(value.length > 16){
        value = value.slice(0,16);
    }
let formatted=value.replace(/(.{4})/g,"$1 ").trim();
this.value=formatted;

checkValid();

});

// expiry format MM/YY
expiryInput.addEventListener('input',function(){

let value=this.value.replace(/\D/g,'');

if(value.length>=3){
value=value.slice(0,2)+"/"+value.slice(2,4);
}

this.value=value;

checkValid();

});

// cvv validation
cvvInput.addEventListener('input', function(){

    // allow only numbers
    this.value = this.value.replace(/\D/g,'');

    // ✅ LIMIT to 3 digits
    if(this.value.length > 3){
        this.value = this.value.slice(0,3);
    }

    checkValid();

});
}



// PROCESS PAYMENT
function processPayment(){

const payButton=document.getElementById('payButton');

const originalText=payButton.innerHTML;

payButton.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';
payButton.disabled=true;

let paymentDetail='';

if(selectedMethod==="gpay"){
paymentDetail="Google Pay - "+document.getElementById("upiId").value;
}

else if(selectedMethod==="phonepay"){
paymentDetail="PhonePe - "+document.getElementById("mobileNumber").value;
}
else if(selectedMethod==="netbanking"){
    let bank = document.getElementById("bankSelect").value;
    let account = document.getElementById("accountNumber").value;
    paymentDetail = "Netbanking - " + bank + " (Acc: " + account.slice(-4) + ")";
}
else {
let card=document.getElementById("cardNumber").value;
paymentDetail="Card ending "+card.slice(-4);
}


setTimeout(()=>{

const transactionId='INT-'+Math.random().toString(36).substr(2,9).toUpperCase();

document.getElementById('transactionId').innerHTML=
"Transaction ID: "+transactionId+
"<br><small>"+paymentDetail+"</small>";

document.getElementById('successModal').classList.add('active');
finalTransactionId = transactionId;

const params = new URLSearchParams(window.location.search);
finalAmount = params.get("amount") || "0";
payButton.innerHTML=originalText;
payButton.disabled=false;


},2000);

}



// REDIRECT




// CLOSE MODAL
window.onclick=function(event){

const modal=document.getElementById('successModal');

if(event.target===modal){
modal.classList.remove('active');
}

}

async function applyAfterPayment() {

    console.log("Apply after payment triggered");

    const params = new URLSearchParams(window.location.search);

    let internshipId = params.get("internship_id");
    let companyName = encodeURIComponent(params.get("company_name"));
    let internshipTitle = encodeURIComponent(params.get("internship_name"));
    let xhr = new XMLHttpRequest();
    xhr.open("POST", "applyInternship.jsp", true);
    xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

    xhr.onreadystatechange = function () {

        if (xhr.readyState === 4) {

            try {
                let response = JSON.parse(xhr.responseText);

                if (response.success) {
                    alert("Application submitted successfully!");
                    window.location.href = "studenthome.jsp";
                } else {
                    alert(response.message || "Application failed");
                }

            } catch (e) {
                console.error(e);
                alert("Error submitting application");
            }
        }
    };

    xhr.onerror = function () {
        alert("Network error");
    };

    xhr.send(
    "internship_id=" + internshipId +
    "&company_name=" + companyName +
    "&internship_title=" + internshipTitle +
    "&transaction_id=" + encodeURIComponent(finalTransactionId) +
    "&amount=" + encodeURIComponent(finalAmount)
);
}
</script>

</body>
</html>
